<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- iPhoneでの入力時自動ズームを防ぐためのviewport設定 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POCO METER - ネオン風メーター管理</title>
  
  <!-- Tailwind CSS (デザイン用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Chart.js (グラフ用) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Lucide Icons (アイコン用) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    // Tailwindのカスタムカラー設定
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
            mono: ['"Courier New"', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* 全体の背景とベーススタイル */
    body {
      background-color: #050510;
      color: #e2e8f0;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent; /* タップ時のハイライトを消す */
    }
    
    /* ネオンテキストエフェクト */
    .neon-text-cyan { color: #22d3ee; text-shadow: 0 0 5px #22d3ee, 0 0 15px #22d3ee; }
    .neon-text-pink { color: #ec4899; text-shadow: 0 0 5px #ec4899, 0 0 15px #ec4899; }
    .neon-text-purple { color: #a855f7; text-shadow: 0 0 5px #a855f7, 0 0 15px #a855f7; }
    .neon-text-green { color: #4ade80; text-shadow: 0 0 5px #4ade80, 0 0 15px #4ade80; }

    /* ネオンボックスエフェクト */
    .neon-box-cyan {
      border: 1px solid rgba(34,211,238,0.6);
      box-shadow: 0 0 15px rgba(34,211,238,0.2), inset 0 0 10px rgba(34,211,238,0.1);
      background-color: rgba(15,23,42,0.8);
      backdrop-filter: blur(12px);
    }
    .neon-box-purple {
      border: 1px solid rgba(168,85,247,0.5);
      box-shadow: 0 0 15px rgba(168,85,247,0.2), inset 0 0 10px rgba(168,85,247,0.1);
      background-color: rgba(15,23,42,0.8);
      backdrop-filter: blur(12px);
    }

    /* フォーム入力フィールド (iOSズーム対策で font-size: 16px 固定) */
    .neon-input {
      width: 100%;
      background-color: #020617;
      border: 1px solid #155e75;
      color: #cffafe;
      border-radius: 0.75rem;
      padding: 0.75rem;
      outline: none;
      transition: all 0.3s;
      font-family: monospace;
      font-size: 16px; 
    }
    .neon-input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 12px rgba(34,211,238,0.5);
    }
    .neon-input-pink:focus {
      border-color: #ec4899;
      box-shadow: 0 0 12px rgba(236,72,153,0.5);
    }

    /* 背景のアンビエントライト */
    .ambient-light-1 { position: fixed; top: -10%; left: -10%; width: 500px; height: 500px; background-color: rgba(8,145,178,0.1); border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .ambient-light-2 { position: fixed; bottom: -10%; right: -10%; width: 500px; height: 500px; background-color: rgba(219,39,119,0.1); border-radius: 50%; filter: blur(120px); pointer-events: none; }
    
    /* アニメーション */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    
    /* ラジオボタンカスタマイズ */
    input[type="radio"]:checked + div {
      border-color: #a855f7;
      box-shadow: 0 0 15px rgba(168,85,247,0.6);
      background-color: rgba(88,28,135,0.4);
      color: #f3e8ff;
      text-shadow: 0 0 8px #a855f7;
    }

    /* トースト通知 */
    #toast {
      transform: translateY(100px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #toast.show {
      transform: translateY(0);
    }
    
    /* 非表示ユーティリティ */
    .hidden-section { display: none !important; }

    /* iPhone 14 Pro用の微調整 (スクロールバーを隠すなど) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body class="selection:bg-cyan-500/40">
  
  <div class="ambient-light-1"></div>
  <div class="ambient-light-2"></div>

  <!-- ヘッダー (スマホ向けにコンパクト化) -->
  <header class="border-b border-slate-800/80 bg-[#050510]/80 sticky top-0 z-50 backdrop-blur-xl">
    <div class="max-w-5xl mx-auto px-3 py-3 flex flex-col gap-3">
      <h1 class="text-2xl font-black italic tracking-widest neon-text-pink text-center">
        POCO<span class="neon-text-cyan">METER</span>
      </h1>
      <nav class="flex p-1 rounded-xl border border-slate-800 bg-slate-900/50 backdrop-blur-sm w-full">
        <button id="btn-tab-input" onclick="switchTab('input')" class="flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm">
          INPUT
        </button>
        <button id="btn-tab-list" onclick="switchTab('list')" class="flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm">
          DATA
        </button>
      </nav>
    </div>
  </header>

  <main class="px-3 py-4 relative z-10 pb-24 max-w-5xl mx-auto">
    
    <!-- ==================== 入力ページ ==================== -->
    <section id="page-input" class="animate-fade-in hidden-section">
      <div class="p-4 sm:p-8 max-w-xl mx-auto mt-2 neon-box-cyan rounded-2xl">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-xl sm:text-2xl font-black flex items-center gap-2 neon-text-cyan" id="form-title">
            <i data-lucide="activity" class="w-6 h-6"></i>
            NEW RECORD
          </h2>
          <button id="cancel-edit-btn" onclick="cancelEdit()" class="hidden text-xs text-pink-400 border border-pink-500/50 px-3 py-1 rounded-full hover:bg-pink-950/50 transition-colors">
            キャンセル
          </button>
        </div>
        
        <form id="record-form" onsubmit="handleFormSubmit(event)" class="space-y-5">
          <input type="hidden" id="edit-id" value="">
          
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-cyan-300 mb-1.5 font-bold tracking-wider text-xs flex items-center gap-1.5">
                <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 日付
              </label>
              <input type="date" id="input-date" required class="neon-input">
            </div>
            <div>
              <label class="block text-cyan-300 mb-1.5 font-bold tracking-wider text-xs flex items-center gap-1.5">
                <i data-lucide="award" class="w-3.5 h-3.5"></i> ランク帯
              </label>
              <select id="input-rank" required class="neon-input appearance-none bg-slate-950">
                <!-- JSでオプションを生成 -->
              </select>
            </div>
          </div>

          <div class="p-4 rounded-xl border border-pink-900/50 bg-pink-950/10 space-y-4 relative mt-2">
            <div class="absolute -top-3 left-4 bg-[#050510] px-2 text-pink-400 text-[10px] font-bold border border-pink-900/50 rounded">通過点</div>
            <div>
              <label class="block text-pink-300 mb-1.5 font-bold tracking-wider text-xs flex items-center gap-1.5">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i> 1時間前
              </label>
              <input type="number" id="input-meter-1h" required class="neon-input neon-input-pink text-pink-100 placeholder-pink-900/50" placeholder="0">
            </div>
            <div>
              <label class="block text-pink-300 mb-1.5 font-bold tracking-wider text-xs flex items-center gap-1.5">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i> 10分前
              </label>
              <input type="number" id="input-meter-10m" required class="neon-input neon-input-pink text-pink-100 placeholder-pink-900/50" placeholder="0">
            </div>
          </div>

          <div>
            <label class="block text-cyan-300 mb-1.5 font-bold tracking-wider text-xs flex items-center gap-1.5">
              <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 締め時間
            </label>
            <input type="number" id="input-meter-end" required class="neon-input text-xl font-bold" placeholder="0">
          </div>

          <div>
            <label class="block text-purple-300 mb-2 font-bold tracking-wider text-xs flex items-center gap-1.5">
              <i data-lucide="zap" class="w-3.5 h-3.5"></i> イベント影響力
            </label>
            <div class="flex gap-2">
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="impact" value="大" class="hidden">
                <div class="text-center py-2.5 px-2 rounded-xl border-2 border-purple-900/50 text-purple-600 transition-all font-bold tracking-wider text-sm">大</div>
              </label>
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="impact" value="中" checked class="hidden">
                <div class="text-center py-2.5 px-2 rounded-xl border-2 border-purple-900/50 text-purple-600 transition-all font-bold tracking-wider text-sm">中</div>
              </label>
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="impact" value="小" class="hidden">
                <div class="text-center py-2.5 px-2 rounded-xl border-2 border-purple-900/50 text-purple-600 transition-all font-bold tracking-wider text-sm">小</div>
              </label>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="w-full py-3.5 mt-6 rounded-xl font-black text-base text-white border-2 border-cyan-400 bg-cyan-950/60 transition-all flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(34,211,238,0.4)] active:scale-95">
            <i data-lucide="save" class="w-5 h-5"></i>
            <span>SAVE DATA</span>
          </button>
        </form>
      </div>
    </section>

    <!-- ==================== データ一覧ページ ==================== -->
    <section id="page-list" class="animate-fade-in hidden-section">
      <div class="max-w-4xl mx-auto mt-2 space-y-4">
        
        <!-- コントロールパネル（フィルター ＆ 表示切替） -->
        <div class="neon-box-purple p-3 rounded-2xl flex flex-col gap-3">
          <div class="flex gap-2 w-full">
            <select id="filter-rank" onchange="renderData()" class="bg-slate-950 border border-purple-500/50 text-purple-200 rounded-lg px-2 py-2 outline-none focus:border-purple-400 text-xs flex-1">
              <option value="all">全ランク帯</option>
              <option value="S">S帯のみ</option>
              <option value="A">A帯のみ</option>
              <option value="B">B帯のみ</option>
              <option value="C">C帯のみ</option>
              <option value="D">D帯のみ</option>
              <option value="E">E帯のみ</option>
            </select>
            <select id="filter-impact" onchange="renderData()" class="bg-slate-950 border border-purple-500/50 text-purple-200 rounded-lg px-2 py-2 outline-none focus:border-purple-400 text-xs flex-1">
              <option value="all">全影響力</option>
              <option value="大">影響力: 大</option>
              <option value="中">影響力: 中</option>
              <option value="小">影響力: 小</option>
            </select>
          </div>
          
          <div class="flex p-1 bg-slate-900 rounded-lg border border-slate-700 w-full">
            <button onclick="switchViewMode('list')" id="btn-view-list" class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all bg-purple-900/60 text-purple-200 shadow-[0_0_10px_rgba(168,85,247,0.3)] border border-purple-500/50">
              <i data-lucide="list" class="w-3.5 h-3.5"></i> LIST
            </button>
            <button onclick="switchViewMode('graph')" id="btn-view-graph" class="flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all text-slate-500 hover:text-purple-400 border border-transparent">
              <i data-lucide="line-chart" class="w-3.5 h-3.5"></i> GRAPH
            </button>
          </div>
        </div>

        <!-- リスト表示エリア -->
        <div id="view-list-area" class="space-y-4">
          <div id="records-container" class="space-y-4">
            <!-- JSでレコードがここに挿入されます -->
          </div>
        </div>

        <!-- グラフ表示エリア -->
        <div id="view-graph-area" class="hidden-section neon-box-cyan p-3 sm:p-6 rounded-2xl w-full overflow-x-auto">
          <!-- iPhoneサイズでもグラフを見やすくするため、最低幅を設定し横スクロールを促す -->
          <div style="min-width: 500px; height: 350px;">
            <canvas id="meterChart"></canvas>
          </div>
          <p class="text-center text-[10px] text-cyan-500/50 mt-2">※グラフは横にスクロールできます</p>
        </div>

      </div>
    </section>
  </main>

  <!-- トースト通知 -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-5 py-2.5 rounded-full border-2 z-50 flex items-center gap-2 bg-cyan-950/90 border-cyan-500 text-cyan-100 shadow-[0_0_20px_rgba(34,211,238,0.6)] backdrop-blur-md opacity-0 pointer-events-none">
    <i data-lucide="check-circle" class="w-4 h-4"></i>
    <span id="toast-msg" class="font-bold tracking-wider text-xs sm:text-sm">保存しました</span>
  </div>

  <script>
    // === 状態管理 (State) ===
    let records = [];
    let currentTab = 'input'; // 'input' or 'list'
    let currentViewMode = 'list'; // 'list' or 'graph'
    let editingId = null;
    let chartInstance = null;

    // ランク帯の定義
    const rankGroups = ['S', 'A', 'B', 'C', 'D', 'E'];
    const rankLevels = ['1', '2', '3'];
    const allRanks = [];
    rankGroups.forEach(g => {
      rankLevels.forEach(l => allRanks.push(g + l));
    });

    // === 初期化 ===
    document.addEventListener('DOMContentLoaded', () => {
      // 日付の初期値を今日に設定
      document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
      
      // ランクのプルダウン生成
      const rankSelect = document.getElementById('input-rank');
      allRanks.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r + '帯';
        // 初期値をC1あたりにしておく
        if(r === 'C1') opt.selected = true;
        rankSelect.appendChild(opt);
      });

      // ローカルストレージからデータ読み込み
      const saved = localStorage.getItem('poco_records');
      if (saved) {
        records = JSON.parse(saved);
      }

      // アイコン描画
      lucide.createIcons();
      
      // 初期画面の設定
      switchTab('input');
    });

    // === UI操作関数 ===

    // タブの切り替え
    function switchTab(tabName) {
      currentTab = tabName;
      
      const pageInput = document.getElementById('page-input');
      const pageList = document.getElementById('page-list');
      const btnInput = document.getElementById('btn-tab-input');
      const btnList = document.getElementById('btn-tab-list');

      // スタイルリセット
      const inactiveClass = 'text-slate-500 hover:text-cyan-400 bg-transparent border-transparent shadow-none';
      btnInput.className = `flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm ${inactiveClass}`;
      btnList.className = `flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm ${inactiveClass}`;

      if (tabName === 'input') {
        pageInput.classList.remove('hidden-section');
        pageList.classList.add('hidden-section');
        
        btnInput.className = 'flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm bg-cyan-950 border border-cyan-500 shadow-[0_0_15px_rgba(34,211,238,0.3)] text-cyan-200 neon-text-cyan';
      } else {
        pageInput.classList.add('hidden-section');
        pageList.classList.remove('hidden-section');
        
        btnList.className = 'flex-1 px-4 py-2 rounded-lg font-bold tracking-wider transition-all duration-300 text-sm bg-pink-950 border border-pink-500 shadow-[0_0_15px_rgba(236,72,153,0.3)] text-pink-200 neon-text-pink';
        
        // リストタブを開いた時にデータを描画
        renderData();
      }
    }

    // 表示モード（リスト/グラフ）の切り替え
    function switchViewMode(mode) {
      currentViewMode = mode;
      
      const areaList = document.getElementById('view-list-area');
      const areaGraph = document.getElementById('view-graph-area');
      const btnList = document.getElementById('btn-view-list');
      const btnGraph = document.getElementById('btn-view-graph');

      const activeStyle = "flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all bg-purple-900/60 text-purple-200 shadow-[0_0_10px_rgba(168,85,247,0.3)] border border-purple-500/50";
      const inactiveStyle = "flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all text-slate-500 hover:text-purple-400 border border-transparent";

      if (mode === 'list') {
        areaList.classList.remove('hidden-section');
        areaGraph.classList.add('hidden-section');
        btnList.className = activeStyle;
        btnGraph.className = inactiveStyle;
      } else {
        areaList.classList.add('hidden-section');
        areaGraph.classList.remove('hidden-section');
        btnList.className = inactiveStyle;
        btnGraph.className = activeStyle;
        drawGraph(); // グラフ再描画
      }
    }

    // トースト通知を表示
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-msg');
      const icon = toast.querySelector('i');
      
      msg.textContent = message;
      
      if (isError) {
        toast.className = "fixed bottom-6 left-1/2 transform -translate-x-1/2 px-5 py-2.5 rounded-full border-2 z-50 flex items-center gap-2 bg-red-950/90 border-red-500 text-red-100 shadow-[0_0_20px_rgba(239,68,68,0.6)] backdrop-blur-md transition-all duration-300 opacity-100 pointer-events-auto show";
        icon.setAttribute('data-lucide', 'alert-circle');
      } else {
        toast.className = "fixed bottom-6 left-1/2 transform -translate-x-1/2 px-5 py-2.5 rounded-full border-2 z-50 flex items-center gap-2 bg-cyan-950/90 border-cyan-500 text-cyan-100 shadow-[0_0_20px_rgba(34,211,238,0.6)] backdrop-blur-md transition-all duration-300 opacity-100 pointer-events-auto show";
        icon.setAttribute('data-lucide', 'check-circle');
      }
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('show');
        toast.style.opacity = '0';
        toast.style.pointerEvents = 'none';
      }, 3000);
    }

    // === データ処理関数 ===

    // フォーム送信（新規保存・更新）
    function handleFormSubmit(e) {
      e.preventDefault();

      const dateStr = document.getElementById('input-date').value;
      const rankVal = document.getElementById('input-rank').value;
      const m1h = Number(document.getElementById('input-meter-1h').value);
      const m10m = Number(document.getElementById('input-meter-10m').value);
      const mEnd = Number(document.getElementById('input-meter-end').value);
      const impactVal = document.querySelector('input[name="impact"]:checked').value;

      if (!dateStr || isNaN(m1h) || isNaN(m10m) || isNaN(mEnd)) {
        showToast('数値を正しく入力してください', true);
        return;
      }

      const recordData = {
        date: dateStr,
        rank: rankVal,
        meter1h: m1h,
        meter10m: m10m,
        meterEnd: mEnd,
        impact: impactVal,
        timestamp: new Date().getTime()
      };

      if (editingId) {
        // 更新処理
        const index = records.findIndex(r => r.id === editingId);
        if (index !== -1) {
          records[index] = { ...records[index], ...recordData };
        }
        showToast('データを更新しました');
        cancelEdit(); // 編集モード解除
      } else {
        // 新規追加
        recordData.id = 'rec_' + Date.now();
        records.push(recordData);
        showToast('データを保存しました');
        
        // メーター入力だけクリア（日付等は残す）
        document.getElementById('input-meter-1h').value = '';
        document.getElementById('input-meter-10m').value = '';
        document.getElementById('input-meter-end').value = '';
      }

      // 日付の降順（新しい順）でソート
      records.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      // ローカルストレージに保存
      localStorage.setItem('poco_records', JSON.stringify(records));
    }

    // 編集モードに入る
    function editRecord(id) {
      const rec = records.find(r => r.id === id);
      if (!rec) return;

      editingId = id;
      
      // フォームに値をセット
      document.getElementById('input-date').value = rec.date;
      document.getElementById('input-rank').value = rec.rank;
      document.getElementById('input-meter-1h').value = rec.meter1h;
      document.getElementById('input-meter-10m').value = rec.meter10m;
      document.getElementById('input-meter-end').value = rec.meterEnd;
      
      const radios = document.querySelectorAll('input[name="impact"]');
      radios.forEach(r => {
        if (r.value === rec.impact) r.checked = true;
      });

      // UI変更
      document.getElementById('form-title').innerHTML = '<i data-lucide="edit" class="w-6 h-6"></i>EDIT RECORD';
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<i data-lucide="refresh-cw" class="w-5 h-5"></i><span>UPDATE DATA</span>';
      btn.className = "w-full py-3.5 mt-6 rounded-xl font-black text-base text-white border-2 border-pink-400 bg-pink-950/60 transition-all flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(236,72,153,0.4)] active:scale-95";
      document.getElementById('cancel-edit-btn').classList.remove('hidden');

      lucide.createIcons();
      switchTab('input');
    }

    // 編集モードキャンセル
    function cancelEdit() {
      editingId = null;
      document.getElementById('record-form').reset();
      
      // 日付を今日に戻す
      document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
      
      document.getElementById('form-title').innerHTML = '<i data-lucide="activity" class="w-6 h-6"></i>NEW RECORD';
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i><span>SAVE DATA</span>';
      btn.className = "w-full py-3.5 mt-6 rounded-xl font-black text-base text-white border-2 border-cyan-400 bg-cyan-950/60 transition-all flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(34,211,238,0.4)] active:scale-95";
      document.getElementById('cancel-edit-btn').classList.add('hidden');
      
      lucide.createIcons();
    }

    // 削除機能
    function deleteRecord(id) {
      if(confirm('このデータを削除してもよろしいですか？')) {
        records = records.filter(r => r.id !== id);
        localStorage.setItem('poco_records', JSON.stringify(records));
        renderData();
        showToast('削除しました');
      }
    }


    // === 描画関連関数 ===

    // 現在のフィルター条件に基づいてデータをフィルタリング
    function getFilteredRecords() {
      const filterRank = document.getElementById('filter-rank').value;
      const filterImpact = document.getElementById('filter-impact').value;

      return records.filter(rec => {
        // ランク帯フィルター
        const matchRank = filterRank === 'all' || rec.rank.startsWith(filterRank);
        // 影響力フィルター
        const matchImpact = filterImpact === 'all' || rec.impact === filterImpact;
        
        return matchRank && matchImpact;
      });
    }

    // リストとグラフを描画（切り替え）
    function renderData() {
      renderList();
      if (currentViewMode === 'graph') {
        drawGraph();
      }
    }

    // リスト領域の描画 (スマホ表示に最適化)
    function renderList() {
      const container = document.getElementById('records-container');
      const filtered = getFilteredRecords();

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="p-8 text-center text-cyan-600 neon-box-cyan border-dashed rounded-xl text-sm">
            該当するデータがありません。<br>INPUTから記録を追加してください。
          </div>
        `;
        return;
      }

      let html = '';
      filtered.forEach(rec => {
        // 計算
        const diff1 = rec.meter10m - rec.meter1h;
        const diff2 = rec.meterEnd - rec.meter10m;
        const totalDiff = rec.meterEnd - rec.meter1h;
        
        // ランクによる色分け設定
        let rankColorClass = "text-slate-300";
        if(rec.rank.startsWith('S')) rankColorClass = "text-yellow-400 [text-shadow:0_0_10px_#facc15]";
        else if(rec.rank.startsWith('A')) rankColorClass = "text-pink-400 [text-shadow:0_0_10px_#ec4899]";
        else if(rec.rank.startsWith('B')) rankColorClass = "text-purple-400 [text-shadow:0_0_10px_#a855f7]";
        else if(rec.rank.startsWith('C')) rankColorClass = "text-cyan-400 [text-shadow:0_0_10px_#22d3ee]";
        else if(rec.rank.startsWith('D')) rankColorClass = "text-green-400 [text-shadow:0_0_10px_#4ade80]";

        html += `
          <div class="p-4 neon-box-purple flex flex-col relative group">
            
            <!-- 編集・削除ボタン (スマホでも押しやすい右上に配置) -->
            <div class="absolute top-3 right-3 flex gap-1 z-10">
              <button onclick="editRecord('${rec.id}')" class="p-2 bg-slate-900/80 hover:bg-pink-900/80 text-slate-400 hover:text-pink-200 rounded-lg transition-colors border border-transparent hover:border-pink-500" title="編集">
                <i data-lucide="edit-3" class="w-4 h-4"></i>
              </button>
              <button onclick="deleteRecord('${rec.id}')" class="p-2 bg-slate-900/80 hover:bg-red-900/80 text-slate-400 hover:text-red-200 rounded-lg transition-colors border border-transparent hover:border-red-500" title="削除">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>

            <!-- ヘッダー部分：日付とタグ -->
            <div class="flex items-end gap-3 border-b border-purple-900/30 pb-2 mb-3 pr-16">
              <div class="text-xl font-black tracking-widest neon-text-purple leading-none">
                ${rec.date.replace(/-/g, '/')}
              </div>
              <div class="text-sm font-black bg-slate-900 px-2 py-0.5 rounded border border-slate-700 ${rankColorClass}">
                ${rec.rank}
              </div>
              <div class="text-[10px] px-2 py-0.5 rounded-full border border-purple-500 text-purple-200 shadow-[0_0_8px_rgba(168,85,247,0.4)] bg-purple-950/50 flex items-center gap-1">
                <i data-lucide="zap" class="w-2.5 h-2.5 text-purple-400"></i>
                <span class="font-bold">${rec.impact}</span>
              </div>
            </div>
            
            <!-- 数値部分 (iPhone対応: 3カラム横並びグリッド) -->
            <div class="grid grid-cols-3 gap-2 items-stretch">
              
              <!-- 1時間前 -->
              <div class="bg-slate-950/80 p-2 rounded-lg border border-pink-900/50 flex flex-col items-center justify-center text-center">
                <span class="text-[9px] font-bold text-pink-500/70 mb-0.5">1時間前</span>
                <span class="text-sm sm:text-base font-mono neon-text-pink">${rec.meter1h.toLocaleString()}</span>
                <span class="text-[9px] font-bold text-green-400 mt-1 bg-green-900/20 px-1 rounded-sm">+${diff1.toLocaleString()}</span>
              </div>
              
              <!-- 10分前 -->
              <div class="bg-slate-950/80 p-2 rounded-lg border border-pink-900/50 flex flex-col items-center justify-center text-center">
                <span class="text-[9px] font-bold text-pink-500/70 mb-0.5">10分前</span>
                <span class="text-sm sm:text-base font-mono neon-text-pink">${rec.meter10m.toLocaleString()}</span>
                <span class="text-[9px] font-bold text-green-400 mt-1 bg-green-900/20 px-1 rounded-sm">+${diff2.toLocaleString()}</span>
              </div>
              
              <!-- 締め時間 -->
              <div class="bg-slate-950/80 p-2 rounded-lg border-2 border-cyan-800 flex flex-col items-center justify-center text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-cyan-500/5"></div>
                <span class="text-[9px] font-bold text-cyan-400/80 mb-0.5 relative z-10">締め時間</span>
                <span class="text-base sm:text-lg font-black font-mono neon-text-cyan relative z-10">${rec.meterEnd.toLocaleString()}</span>
                <span class="text-[9px] font-bold text-green-400 mt-1 relative z-10 bg-green-900/20 px-1.5 rounded-sm">総+${totalDiff.toLocaleString()}</span>
              </div>
              
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      lucide.createIcons(); 
    }

    // グラフ領域の描画
    function drawGraph() {
      const ctx = document.getElementById('meterChart').getContext('2d');
      const filtered = getFilteredRecords();
      
      const sorted = [...filtered].reverse();

      const labels = sorted.map(r => r.date.substring(5).replace('-', '/')); 
      const data1h = sorted.map(r => r.meter1h);
      const data10m = sorted.map(r => r.meter10m);
      const dataEnd = sorted.map(r => r.meterEnd);

      if (chartInstance) {
        chartInstance.destroy();
      }

      Chart.defaults.color = '#94a3b8';
      Chart.defaults.font.family = '"Courier New", monospace';

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '1時間前',
              data: data1h,
              borderColor: '#db2777', 
              backgroundColor: 'rgba(219, 39, 119, 0.1)',
              borderWidth: 2,
              pointBackgroundColor: '#0f172a',
              pointBorderColor: '#db2777',
              pointBorderWidth: 2,
              tension: 0.3
            },
            {
              label: '10分前',
              data: data10m,
              borderColor: '#f472b6', 
              backgroundColor: 'rgba(244, 114, 182, 0.1)',
              borderWidth: 2,
              borderDash: [5, 5],
              pointBackgroundColor: '#0f172a',
              pointBorderColor: '#f472b6',
              pointBorderWidth: 2,
              tension: 0.3
            },
            {
              label: '締め時間',
              data: dataEnd,
              borderColor: '#22d3ee', 
              backgroundColor: 'rgba(34, 211, 238, 0.2)',
              borderWidth: 3,
              pointBackgroundColor: '#22d3ee',
              pointBorderColor: '#fff',
              pointBorderWidth: 1,
              pointRadius: 4,
              pointHoverRadius: 6,
              tension: 0.3,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: { color: '#cbd5e1', font: { size: 10, weight: 'bold' }, boxWidth: 12 }
            },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleColor: '#22d3ee',
              bodyColor: '#e2e8f0',
              borderColor: '#38bdf8',
              borderWidth: 1,
              padding: 8,
              boxPadding: 4,
              titleFont: { size: 12 },
              bodyFont: { size: 12 }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(51, 65, 85, 0.4)', drawBorder: false },
              ticks: { font: { size: 10 } }
            },
            y: {
              grid: { color: 'rgba(51, 65, 85, 0.4)', drawBorder: false },
              ticks: {
                font: { size: 10 },
                callback: function(value) { return value.toLocaleString(); }
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
